# MLB (baseball_mlb) market configuration.
#
# Everything The Odds API v4 exposes for MLB is listed here across the four
# tiers. Use /settings to toggle individual markets on/off — the fetcher
# honors user disables without restart.
#
# QUOTA WARNING: enabling every market at 60s cadence will burn ~6M quota/day
# on a 15-game slate with 5 regions. Default-enable a narrow set (h2h, main
# spreads/totals, alt spreads/totals, F5, pitcher/batter basics) and reach
# for deeper markets selectively.

[main]
enabled          = true
interval_seconds = 60
regions          = ["us", "us2", "us_ex", "eu", "uk"]
markets          = ["h2h", "spreads", "totals"]

[alternates]
enabled          = true
interval_seconds = 60
regions          = ["us", "us2", "us_ex", "eu", "uk"]
markets = [
  "alternate_spreads",
  "alternate_totals",
  "team_totals",
  "alternate_team_totals",
  "h2h_lay",                      # exchange-only (Betfair/Matchbook/Smarkets)
]

[first_innings]
enabled          = true
interval_seconds = 60
regions          = ["us", "us2", "us_ex", "eu", "uk"]
# Every window (1st 1 / 3 / 5 / 7 innings) × every market type.
markets = [
  "h2h_1st_1_innings",
  "h2h_1st_3_innings",
  "h2h_1st_5_innings",
  "h2h_1st_7_innings",
  "h2h_3_way_1st_1_innings",      # rarely returned outside Pinnacle/EU
  "h2h_3_way_1st_3_innings",
  "h2h_3_way_1st_5_innings",
  "h2h_3_way_1st_7_innings",
  "spreads_1st_1_innings",
  "spreads_1st_3_innings",
  "spreads_1st_5_innings",
  "spreads_1st_7_innings",
  "alternate_spreads_1st_1_innings",
  "alternate_spreads_1st_3_innings",
  "alternate_spreads_1st_5_innings",
  "alternate_spreads_1st_7_innings",
  "totals_1st_1_innings",
  "totals_1st_3_innings",
  "totals_1st_5_innings",
  "totals_1st_7_innings",
  "alternate_totals_1st_1_innings",
  "alternate_totals_1st_3_innings",
  "alternate_totals_1st_5_innings",
  "alternate_totals_1st_7_innings",
]

[player_props]
enabled             = true
interval_seconds    = 60
regions             = ["us", "us2", "us_ex", "eu", "uk"]
games_window_hours  = 3
markets = [
  # --- Batter standard lines ---
  "batter_home_runs",
  "batter_first_home_run",        # Yes/No; US books only
  "batter_hits",
  "batter_total_bases",
  "batter_rbis",
  "batter_runs_scored",
  "batter_hits_runs_rbis",
  "batter_singles",
  "batter_doubles",
  "batter_triples",
  "batter_walks",
  "batter_strikeouts",
  "batter_stolen_bases",
  "batter_fantasy_score",         # DFS books only (PrizePicks/Underdog)

  # --- Batter alternate lines ---
  "batter_total_bases_alternate",
  "batter_home_runs_alternate",
  "batter_hits_alternate",
  "batter_rbis_alternate",
  "batter_walks_alternate",
  "batter_strikeouts_alternate",
  "batter_runs_scored_alternate",
  "batter_singles_alternate",
  "batter_doubles_alternate",
  "batter_triples_alternate",
  "batter_fantasy_score_alternate", # DFS only

  # --- Pitcher standard lines ---
  "pitcher_strikeouts",
  "pitcher_record_a_win",         # Yes/No; US books only
  "pitcher_hits_allowed",
  "pitcher_walks",
  "pitcher_earned_runs",
  "pitcher_outs",

  # --- Pitcher alternate lines ---
  "pitcher_strikeouts_alternate",
  "pitcher_hits_allowed_alternate",
  "pitcher_walks_alternate",
  "pitcher_earned_runs_alternate",
  "pitcher_outs_alternate",
]

[on_demand]
enabled          = true
debounce_seconds = 60

# Picks filter — which bet types surface on /picks/mlb. Only bet_types in
# this list are shown; leave empty to surface everything the agent writes.
[picks]
include_bet_types = [
  # Main game markets
  "moneyline",
  "run_line",
  "total",
  # First-N-innings
  "first_5_ml",
  "first_5_rl",
  "first_5_total",
  "first_3_total",
  "first_1_total",
  # Pitcher props
  "pitcher_strikeouts",
  "pitcher_outs",
  "pitcher_hits_allowed",
  "pitcher_earned_runs",
  "pitcher_walks",
  "pitcher_record_a_win",
  # Batter props
  "batter_hits",
  "batter_home_runs",
  "batter_first_home_run",
  "batter_total_bases",
  "batter_rbis",
  "batter_runs_scored",
  "batter_hits_runs_rbis",
  "batter_singles",
  "batter_doubles",
  "batter_triples",
  "batter_walks",
  "batter_strikeouts",
  "batter_stolen_bases",
]
