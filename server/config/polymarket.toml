# Polymarket direct-API integration — per-sport slug-prefix mapping.
#
# Polymarket discovery: GET gamma-api.polymarket.com/events?tag_slug=sports
# returns every active sports event globally. We filter locally by
# `slug_prefix` to bucket events into our sport_keys.
#
# Phase 1: NBA / MLB / NHL h2h moneylines.
# Phase 2 (this commit): adds WNBA + EPL (soccer multi-prefix). Per-sport
# coverage now includes h2h, spread (alt-line ladder), total (Over/Under
# ladder), and NBA player_points props. Soccer h2h is 3-way (separate
# yes/no per outcome). Tennis / esports / period markets deferred.

[sports.nba]
slug_prefix = "nba"

[sports.mlb]
slug_prefix = "mlb"

[sports.nhl]
slug_prefix = "nhl"

# WNBA — same slug shape as NBA. Polymarket hasn't published a regular-
# season WNBA slate at the time of this commit (probed empty 2026-05-12);
# mapping is wired so it works the moment events appear.
[sports.wnba]
slug_prefix = "wnba"

# Soccer — Polymarket uses LEAGUE-specific prefixes (epl, laliga, seriea,
# bundesliga, ligue1, mls), not a generic "soccer" prefix. The fetcher
# filters events with `startswith(any prefix + "-")`. Start with EPL
# only (the only league with live events at the time of this commit) —
# others added when they appear.
[sports.soccer]
slug_prefixes = ["epl"]

# Phase 2+ stubs (uncomment when normalizers ship):
#
# [sports.tennis_atp] slug_prefix = "atp"
# [sports.tennis_wta] slug_prefix = "wta"


# ─── Team aliases ────────────────────────────────────────────────────
# Lowercase + punctuation-stripped form → canonical (Odds API) team name.
# The primary path is TEAM_CODE_TO_CANONICAL in mapping.py which maps
# directly off slug team codes. Aliases are reactive — add entries here
# when orphan logs surface a code/name the code map doesn't recognize.

[team_aliases.nba]

[team_aliases.mlb]

[team_aliases.nhl]

[team_aliases.wnba]

[team_aliases.soccer]
