# Tennis (ATP + WTA tournaments) market configuration.
#
# The Odds API's tennis coverage is minimal. Only h2h, spreads (game spreads),
# totals (game totals), and outrights (tournament winners) are available.
# There are NO alternate lines, NO set-level markets, and NO player props on
# The Odds API for tennis — those require a different data provider.
#
# Sport keys are per-tournament (tennis_atp_wimbledon, tennis_wta_us_open,
# tennis_atp_french_open, etc.) and are discovered dynamically at fetch time.

[main]
enabled          = true
interval_seconds = 60
regions          = ["us", "us2", "us_ex", "eu", "uk"]
markets = [
  "h2h",          # Match winner — widely covered
  "spreads",      # Game spreads — limited bookmaker coverage
  "totals",       # Total games over/under — limited bookmaker coverage
  "h2h_lay",      # Exchange-only (Betfair/Matchbook/Smarkets)
]

# No alternate lines available on The Odds API for tennis.
[alternates]
enabled          = false
interval_seconds = 60
regions          = []
markets          = []

# No set-level markets available on The Odds API for tennis.
# (No set winners, set spreads/totals, correct-set-score, etc.)
[periods]
enabled          = false
interval_seconds = 60
regions          = []
markets          = []

# No player props available on The Odds API for tennis.
# (No player_aces, player_games, player_double_faults, player_sets_won, etc.)
[player_props]
enabled             = false
interval_seconds    = 60
regions             = []
games_window_hours  = 3
markets             = []

[on_demand]
enabled          = true
debounce_seconds = 60

# Picks filter — which bet types surface on /picks/tennis.
[picks]
include_bet_types = [
  "moneyline",
  # tennis-agents bet cards use "game_handicap" for game-count spreads.
  # Keep "game_spread" as an alias in case that file format changes.
  "game_handicap",
  "game_spread",
  "total_games",
  # Set-level markets present on tennis-agents bet cards but not sold on
  # The Odds API — keep in include list so they still appear here:
  "set_spread",
  "total_sets",
]
