# NCAA Baseball (baseball_ncaa) market configuration.
#
# Coverage on The Odds API is a subset of what MLB offers — main lines and
# alternates are well-supported; inning markets show up inconsistently; US
# college books typically don't carry player props (NIL restrictions). The
# markets below are LISTED for visibility; fewer will actually return data.

[main]
enabled          = true
interval_seconds = 300
regions          = ["us", "us2", "us_ex", "eu", "uk"]
markets = [
  "h2h",
  "spreads",
  "totals",
]

[alternates]
enabled          = true
interval_seconds = 300
regions          = ["us", "us2", "us_ex", "eu", "uk"]
markets = [
  "alternate_spreads",
  "alternate_totals",
  "team_totals",
  "alternate_team_totals",
  "h2h_lay",
]

[periods]
enabled          = true
interval_seconds = 300
regions          = ["us", "us2", "us_ex", "eu", "uk"]
markets = [
  "h2h_1st_5_innings",
  "spreads_1st_5_innings",
  "alternate_spreads_1st_5_innings",
  "totals_1st_5_innings",
  "alternate_totals_1st_5_innings",
  "h2h_1st_3_innings",
  "spreads_1st_3_innings",
  "totals_1st_3_innings",
  "h2h_1st_1_innings",
  "totals_1st_1_innings",
]

# College sports generally don't offer player props; tier disabled by default.
[player_props]
enabled             = false
interval_seconds    = 300
regions             = []
games_window_hours  = 6
markets             = []

[on_demand]
enabled          = true
debounce_seconds = 60

[picks]
include_bet_types = [
  "moneyline",
  "run_line",
  "total",
  "first_5_ml",
  "first_5_rl",
  "first_5_total",
  "first_3_total",
]
