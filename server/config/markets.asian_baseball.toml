# Asian Baseball (NPB Japan + KBO Korea) market configuration.
#
# Two Odds API keys resolve into this one sport — fetcher calls each per
# cycle. Game cadence is daily; 60s interval is fine since these overlap
# closely with US morning hours (Asian prime time = US afternoon/evening).

[main]
enabled          = true
interval_seconds = 300
regions          = ["us", "us2", "us_ex", "eu", "uk"]
markets = [
  "h2h",
  "spreads",
  "totals",
]

[alternates]
enabled          = true
interval_seconds = 300
regions          = ["us", "us2", "us_ex", "eu", "uk"]
markets = [
  "alternate_spreads",
  "alternate_totals",
  "h2h_lay",
]
