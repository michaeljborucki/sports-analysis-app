# The event matcher's word-prefix fallback (event_matcher.py) handles the
# "{school}" ↔ "{school} {mascot…}" mapping algorithmically for all 300+
# D-I programs without a maintained list. Entries below exist only to:
#   a) DISAMBIGUATE bare names that prefix-match multiple candidates
#      (e.g., "Miami" → Miami FL vs Miami OH; pick the one you care about)
#   b) OVERRIDE the prefix heuristic when Odds API uses a non-obvious
#      canonical form (e.g., abbreviations, punctuation)
