# coral33.com integration — sport/endpoint mapping.
#
# Each [sports.<our_key>] block declares how to iterate coral33's endpoint
# space (sportType × sportSubType × period) for that sport. The fetcher makes
# one Get_LeagueLines2 call per (sport_type, subtype, period) tuple per tick.
#
# Team aliases are applied after normalization (lowercase, punctuation stripped,
# whitespace collapsed) during event matching. Add entries only when coral33
# and Odds API disagree — identity matches are the common case.

# Subtype strings use the LITERAL server names with spaces (not URL-encoded).
# Confirmed via Get_SportsLeagues probe (2026-04-20):
#   BASKETBALL: NBA, NBA ALT LINE, NBAPLAYERPRO, NBA GPROPS, NBA ADJ SERI
#   HOCKEY:     NHL, HOCKEY ALTER, NHL GAME PRO, NHL ADJ SERI, NHL REG TIME
#   BASEBALL:   MLB, MLB ALT LINE, MLB SERIES, NCAABASEBALL, BASEPLAPROP
#   TENNIS:     (only Futures + WTA MATCHUPS currently in catalog; live-match
#                subtypes may appear dynamically during tournaments)

[sports.nba]
sport_type    = "BASKETBALL"
subtypes_main = ["NBA"]
subtypes_alt  = ["NBA ALT LINE"]
subtypes_prop = ["NBAPLAYERPRO"]
periods = ["Game", "1st Half", "2nd Half", "1st Quarter", "2nd Quarter", "3rd Quarter", "4th Quarter"]
# NBA GPROPS ("score first", "10 pts first", "15 pts first" etc.) — 2-way
# team-level game props with MoneyLine1/2.
[[sports.nba.extras]]
subtype = "NBA GPROPS"
kind    = "game_props"

[sports.wnba]
sport_type    = "BASKETBALL"
# Probed 2026-05-09: only `WNBA` (game/1st Half/1st Quarter) is in the
# coral33 catalog. ALT LINE / PLAYERPRO / GPROPS / SERIES / ADJ SERI all
# returned 0 lines. Cross-shop with Odds API on these three periods.
subtypes_main = ["WNBA"]
subtypes_alt  = []
subtypes_prop = []
periods = ["Game", "1st Half", "1st Quarter"]


[sports.nhl]
sport_type    = "HOCKEY"
subtypes_main = ["NHL"]
subtypes_alt  = ["HOCKEY ALTER"]
subtypes_prop = ["NHL GAME PRO"]
periods = ["Game", "1st Period", "2nd Period", "3rd Period"]
# NHL REG TIME — regulation-only spread + total (teams end with "(Reg Time)").
# Emits spreads_reg_time / totals_reg_time market keys.
[[sports.nhl.extras]]
subtype = "NHL REG TIME"
kind    = "reg_time"

[sports.mlb]
sport_type    = "BASEBALL"
subtypes_main = ["MLB"]
subtypes_alt  = ["MLB ALT LINE"]
subtypes_prop = ["BASEPLAPROP"]
periods = ["Game", "1st 5 Innings"]
# H-R-E — combined hits+runs+errors total (teams suffixed " H+R+E").
# TEAMSCOR 1ST — 2-way ML, which team scores first (suffix " score first").
# SCORE IN 1ST — Yes/No, does either team score in the 1st inning.
[[sports.mlb.extras]]
subtype = "H-R-E"
kind    = "hre"
[[sports.mlb.extras]]
subtype = "TEAMSCOR 1ST"
kind    = "team_score_first"
[[sports.mlb.extras]]
subtype = "SCORE IN 1ST"
kind    = "score_first_inning"

[sports.baseball_ncaa]
sport_type    = "BASEBALL"
subtypes_main = ["NCAABASEBALL"]
subtypes_alt  = []                      # not offered by coral33 for NCAA
periods = ["Game"]

[sports.asian_baseball]
sport_type    = "BASEBALL"
# coral33's WBC subtype (display "Asian Baseball") bundles NPB + KBO in one
# feed. Teams come through with full names ("Yomiuri Giants", "NC Dinos")
# that largely match Odds API conventions — aliases added as needed below.
subtypes_main = ["WBC"]
subtypes_alt  = []
periods = ["Game"]

[sports.soccer]
sport_type    = "SOCCER"
# Curated top-tier league set. Extend the `subtypes_main` list when you want
# finer coverage — each subtype is one extra coral33 call per cycle.
# Subtype literals come from the coral33 Get_SportsLeagues catalog probe
# (some are truncated; spaces are LITERAL, not URL-escaped).
subtypes_main = [
  "ENG PREM",       # English Premier League
  "SPA LA LIGA",    # Spain La Liga
  "ITA SER A",      # Italy Serie A
  "GER BUNDE",      # Germany Bundesliga
  "FRE LIGUE1",     # France Ligue 1
  "UEFA CH LEA",    # UEFA Champions League
  "USA MLS",        # USA MLS
  "MEX - PR DIV",   # Mexico Primera Division (Liga MX)
  "BRA - SER A",    # Brazil Serie A
  "JAP J LEA",      # Japan J-League (also carries other Asian leagues per catalog)
  "ARG PRI DIV",    # Argentina Primera Division
  "WORLD CUP",      # FIFA World Cup / qualifiers (catch-all when hot)
]
subtypes_alt  = []   # no soccer alt subtypes in catalog
periods = ["Game"]


[sports.tennis]
sport_type    = "TENNIS"
# `ATP MATCHU` is the LITERAL sportSubType coral33 emits (truncated at 10
# chars in their catalog — confirmed via Get_SportsLeagues probe). Full-
# length `WTA MATCHUPS` is the sibling. Each returns two lines per match:
# a bare-name line (carries h2h + set-level totals — only h2h is kept),
# and a " Games"-suffixed line (carries game-level spread + total — maps
# to Odds API's `spreads` / `totals` tennis keys).
subtypes_main = ["ATP MATCHU", "WTA MATCHUPS"]
subtypes_alt  = []                      # no tennis alt subtypes in catalog
periods = ["Game"]


[sports.ufc]
sport_type    = "MARTIAL ARTS"
# Two UFC subtypes — main PPV cards + Fight Night events. Both are h2h
# primarily; UFC2 (Fight Night) sometimes has rounds-totals. Confirmed
# via probe 2026-05-01: Sean Strickland vs Khamzat Chimaev (UFC 328),
# Kody Steele vs Dom Mar Fan (Fight Night), etc.
subtypes_main = ["MMA - UFC", "MMA - UFC2"]
subtypes_alt  = []                      # no MMA alts in catalog
periods = ["Game"]


[sports.boxing]
sport_type    = "BOXING"
# Five separate "card" subtypes — coral33 lists each headline boxing card
# as its own league key. They all map to the same Odds API key
# (boxing_boxing) and resolve to distinct event_ids at match time. Probe
# confirmed all five active 2026-05-01.
subtypes_main = [
  "MATCHUPS",       # Asian/Japanese headline (Tokyo Dome)
  "BOX MATCHU",     # secondary card (Aleem vs Leo)
  "BOX FIGHTS",     # secondary card (Dubois vs Wardley)
  "BOXING OTHER",   # ZUFFA Boxing / undercard set
  "BOXING",         # main US-headlined card (Munguia, Benavidez)
]
subtypes_alt  = []
periods = ["Game"]


[sports.cricket]
sport_type    = "CRICKET"
# Two subtypes — IPL (mislabeled "ICCINTERCUP") + International T20.
# h2h-only on both sides (Odds API does NOT expose cricket totals).
# Probe confirmed 2026-05-01: Chennai Super Kings vs Mumbai Indians (IPL),
# Bangladesh vs New Zealand (International T20).
subtypes_main = ["ICCINTERCUP", "TWENTY20INTE"]
subtypes_alt  = []
periods = ["Game"]


